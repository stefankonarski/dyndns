name: Tests

on:
  push:
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image (PHP 8.5)
        run: docker compose -f docker-compose.test.yml build dyndns-test

      - name: Run PHPUnit in Docker
        run: docker compose -f docker-compose.test.yml run --rm dyndns-test
