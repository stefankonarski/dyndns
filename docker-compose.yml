services:
  dyndns:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dyndns-service
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET:-change-me-in-env}
      DATABASE_URL: sqlite:////app/var/data/app.db
      HETZNER_DNS_API_TOKEN: ${HETZNER_DNS_API_TOKEN:-}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-127.0.0.1,REMOTE_ADDR}
    ports:
      - "9099:80"
    volumes:
      - ./var:/app/var

